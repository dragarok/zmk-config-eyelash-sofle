name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    # Pinned to v0.3.0 to match the Zephyr 3.5 firmware. The @main workflow runs
    # a `west boards --format "{qualifiers}"` compat check that only exists on
    # Zephyr 4.1 and crashes (KeyError: 'qualifiers') against this firmware.
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3.0
