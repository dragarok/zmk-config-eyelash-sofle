# forked from https://github.com/urob/zmk-config/blob/9f386d209657a1aefc625633bda13f5a091ea465/config/west.yml
# and https://github.com/a741725193/zmk-sofle/blob/53a89e7553fc973ee2d429626aaa0d8b8e06af76/config/west.yml

manifest:
  defaults:
    remote: urob
    revision: v0.3

  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
    - name: urob
      url-base: https://github.com/urob
    - name: m165437
      url-base: https://github.com/M165437
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
      revision: v0.3

    - name: eyelash_sofle
      url: https://github.com/a741725193/zmk-sofle
      revision: main

    # Animated nice_view display (status screen + peripheral animation).
    # Replaces the unmaintained mario-peripheral-animation. Pin to the release
    # matching ZMK v0.3. See https://github.com/M165437/nice-view-gem
    - name: nice-view-gem
      remote: m165437
      revision: v0.3.0

    - name: zmk-helpers
      path: modules/zmk/helpers
    - name: zmk-tri-state
      path: modules/zmk/tri-state
    - name: zmk-auto-layer
      path: modules/zmk/auto-layer

    # Only source necessary Zephyr modules. Remove this entire section to restore
    # the default (needed for less common hardware).
    - name: zephyr
      remote: zmkfirmware
      revision: v3.5.0+zmk-fixes
      clone-depth: 1
      import:
        name-allowlist:
          - cmsis
          - hal_nordic
          - lvgl
          - tinycrypt

  self:
    path: config
